name: Build & Deploy JAR

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build JAR
        run: |
          cd backend
          mvn clean package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "backend/target/*.jar"
          target: "/home/ubuntu/app/"
          strip_components: 2

      - name: Replace and Restart App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/app
      
            echo "Stopping old app..."
            docker stop backend || true
            docker rm backend || true
      
            echo "Removing old jar..."
            rm -f app.jar
      
            echo "Picking latest uploaded jar..."
            JAR=$(ls -t *.jar | head -n 1)
      
            echo "Cleaning extra jars..."
            find . -name "*.jar" ! -name "app.jar" -delete
      
            echo "Building Docker image..."
            docker build -t water-backend .
            
            echo "Starting container..."
            docker run -d \
              -p 8099:8080 \
              --env-file .env \
              --name backend \
              --restart always \
              water-backend
      
            echo "Done"
