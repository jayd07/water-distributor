name: Build & Deploy via Docker Hub

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build JAR
        run: |
          cd backend
          mvn clean package -DskipTests

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/water-backend:latest ./backend

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/water-backend:latest

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "Stopping old container..."
            docker stop backend || true
            docker rm backend || true

            echo "Pulling latest image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/water-backend:latest

            echo "Starting container..."
            docker run -d \
              -p 8099:8080 \
              --env-file /home/ubuntu/app/.env \
              --name backend \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/water-backend:latest

            echo "Cleaning unused images..."
            docker image prune -f
